<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Drip</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0b10; --bg2:#12121a; --bg3:#1a1a25;
  --text-primary:#e8e8f0; --text-secondary:#7777aa;
  --accent:#7c5cfc; --accent-dim:#5a3fc8;
  --border-subtle:#22223a; --radius:12px;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh}
.cont{max-width:680px;margin:0 auto;padding:16px}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 0;margin-bottom:4px}
.hdr h1{font-size:1.5rem;font-weight:600;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.hdr h1 span{background:linear-gradient(135deg,#7c5cfc,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-actions{display:flex;align-items:center;gap:8px}
.user-badge{font-size:0.8rem;color:var(--text-secondary);padding:4px 10px;background:var(--bg3);border-radius:20px;white-space:nowrap}
.btn-outline{background:transparent;border:1px solid var(--border-subtle);color:var(--text-secondary);padding:6px 14px;border-radius:20px;font-size:0.8rem;cursor:pointer;transition:.15s}
.btn-outline:hover{border-color:var(--accent);color:var(--text-primary)}
#dropCount{font-size:0.75rem;color:var(--text-secondary);padding:2px 8px;background:var(--bg3);border-radius:10px}

/* Filters + View toggle */
.ft-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px}
#filters{display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1}
.filter-btn{background:transparent;border:1px solid transparent;color:var(--text-secondary);padding:4px 12px;border-radius:16px;font-size:0.78rem;cursor:pointer;transition:.15s}
.filter-btn.on{background:var(--bg3);border-color:var(--border-subtle);color:var(--text-primary)}
.filter-btn:hover{border-color:var(--border-subtle)}
.ft-spacer{flex:1}
.vw-btn{background:transparent;border:1px solid var(--border-subtle);color:var(--text-secondary);padding:4px 12px;border-radius:16px;font-size:0.78rem;cursor:pointer;transition:.15s}
.vw-btn.on{background:var(--accent-dim);border-color:var(--accent);color:#fff}
.vw-btn:hover{border-color:var(--accent);color:var(--text-primary)}

/* Drop zone */
.drop-zone{border:2px dashed var(--border-subtle);border-radius:var(--radius);padding:32px 20px;text-align:center;cursor:pointer;transition:.2s;margin:8px 0 12px}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:var(--bg2)}
.drop-zone-icon{font-size:2rem;margin-bottom:6px}
.drop-zone-text{color:var(--text-secondary);font-size:0.85rem}
.drop-zone-hint{color:var(--text-secondary);font-size:0.72rem;margin-top:4px;opacity:.6}
#dropFile{display:none}

/* Drop form */
.drop-form{display:none;background:var(--bg2);border:1px solid var(--border-subtle);border-radius:var(--radius);padding:16px;margin:8px 0 12px}
.drop-form.open{display:block}
.df-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.df-head .badge{font-size:0.72rem;padding:3px 10px;border-radius:12px;background:var(--bg3);color:var(--text-secondary)}
.df-head .badge.on{background:var(--accent-dim);color:#fff}
.df-row{margin-bottom:8px}
.df-row input,.df-row textarea{width:100%;background:var(--bg3);border:1px solid var(--border-subtle);border-radius:8px;padding:10px 12px;font-size:0.9rem;color:var(--text-primary);outline:none;transition:.15s}
.df-row input:focus,.df-row textarea:focus{border-color:var(--accent)}
.df-row textarea{min-height:80px;resize:vertical;font-family:inherit}
.df-preview{display:none;margin-bottom:8px;padding:8px;background:var(--bg3);border-radius:8px}
.df-preview.open{display:flex;align-items:center;gap:10px}
.df-preview img{max-height:60px;border-radius:6px}
.df-preview span{font-size:0.78rem;color:var(--text-secondary)}

/* Tags */
.tag-arena{display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin-bottom:8px}
.tag-arena input{background:transparent;border:none;color:var(--text-primary);font-size:0.82rem;padding:4px 0;outline:none;width:80px}
.tag-pill{font-size:0.72rem;padding:3px 10px;border-radius:12px;background:var(--bg3);color:var(--text-secondary);cursor:pointer;border:1px solid transparent;transition:.15s}
.tag-pill.on{background:var(--accent-dim);border-color:var(--accent);color:#fff}
.tag-pill.suggest{background:transparent;border:1px dashed var(--border-subtle);color:var(--text-secondary)}
.tag-pill.suggest.on{border-style:solid}
.tag-pill .x{margin-left:4px;opacity:.5;font-size:.8rem}
.tag-pill .x:hover{opacity:1}
.ai-hints{display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin-bottom:8px;min-height:20px}

/* Drop button */
.df-actions{display:flex;gap:8px;margin-top:10px}
.btn-primary{flex:1;background:linear-gradient(135deg,var(--accent),#6d4aff);border:none;color:#fff;padding:12px;border-radius:10px;font-size:0.9rem;font-weight:500;cursor:pointer;transition:.15s}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.4;cursor:default}
.btn-cancel{background:transparent;border:1px solid var(--border-subtle);color:var(--text-secondary);padding:12px 18px;border-radius:10px;cursor:pointer;font-size:0.85rem}

/* Stream - card view */
.stream{margin-top:4px}
.drop-card{background:var(--bg2);border:1px solid var(--border-subtle);border-radius:var(--radius);margin-bottom:10px;cursor:pointer;transition:.15s;overflow:hidden}
.drop-card:hover{border-color:#33334a;transform:translateY(-1px)}
.drop-card-pad{padding:14px}
.dc-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dc-avatar{width:30px;height:30px;border-radius:50%;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:600;color:#fff;flex-shrink:0}
.dc-user{flex:1;min-width:0}
.dc-name{font-size:0.8rem;font-weight:500;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dc-time{font-size:0.7rem;color:var(--text-secondary)}
.dc-type{font-size:0.72rem;color:var(--text-secondary);white-space:nowrap}
.dc-title{font-size:0.95rem;font-weight:500;margin-bottom:6px;line-height:1.4}
.dc-desc{font-size:0.82rem;color:var(--text-secondary);line-height:1.6;margin-bottom:6px}
.dc-media img,.dc-media video{width:100%;border-radius:8px;max-height:360px;object-fit:cover;margin-bottom:6px}
.dc-link{border:1px solid var(--border-subtle);border-radius:8px;padding:10px;margin-bottom:6px;background:var(--bg3);cursor:pointer}
.dc-link img{max-height:80px;width:100%;object-fit:cover;border-radius:6px;margin-bottom:6px}
.dc-link-title{font-size:0.82rem;font-weight:500;margin-bottom:2px}
.dc-link-desc{font-size:0.72rem;color:var(--text-secondary)}
.dc-link-host{font-size:0.68rem;color:var(--accent);margin-top:4px}
.dc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.dc-tag{font-size:0.68rem;padding:2px 8px;border-radius:8px;background:var(--bg3);color:var(--text-secondary)}
.dc-actions{display:flex;gap:12px;padding-top:8px;border-top:1px solid var(--border-subtle)}
.dc-act{background:none;border:none;color:var(--text-secondary);font-size:0.78rem;cursor:pointer;padding:2px 6px;border-radius:6px;transition:.15s}
.dc-act:hover{background:var(--bg3);color:var(--text-primary)}

/* Empty state */
.empty-state{text-align:center;padding:48px 20px;color:var(--text-secondary)}
.empty-icon{font-size:2.5rem;display:block;margin-bottom:12px}

/* Loading spinner */
.loading-pulse{display:flex;justify-content:center;padding:48px 0}
.sk-chase{width:30px;height:30px;position:relative;animation:sk-chase 2.5s infinite linear both}
.sk-chase-dot{width:100%;height:100%;position:absolute;left:0;top:0;animation:sk-chase-dot 2s infinite ease-in-out both}
.sk-chase-dot:before{content:'';display:block;width:25%;height:25%;background:var(--accent);border-radius:100%;animation:sk-chase-dot-before 2s infinite ease-in-out both}
.sk-chase-dot:nth-child(1){animation-delay:-1.1s}
.sk-chase-dot:nth-child(2){animation-delay:-1s}
.sk-chase-dot:nth-child(3){animation-delay:-.9s}
.sk-chase-dot:nth-child(4){animation-delay:-.8s}
.sk-chase-dot:nth-child(5){animation-delay:-.7s}
.sk-chase-dot:nth-child(6){animation-delay:-.6s}
.sk-chase-dot:nth-child(1):before{animation-delay:-1.1s}
.sk-chase-dot:nth-child(2):before{animation-delay:-1s}
.sk-chase-dot:nth-child(3):before{animation-delay:-.9s}
.sk-chase-dot:nth-child(4):before{animation-delay:-.8s}
.sk-chase-dot:nth-child(5):before{animation-delay:-.7s}
.sk-chase-dot:nth-child(6):before{animation-delay:-.6s}
@keyframes sk-chase{100%{transform:rotate(360deg)}}
@keyframes sk-chase-dot{80%,100%{transform:rotate(360deg)}}
@keyframes sk-chase-dot-before{50%{transform:scale(.4)}100%,0%{transform:scale(1)}}

/* Modals */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border-subtle);border-radius:var(--radius);padding:20px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto}
.modal-close{float:right;background:none;border:none;color:var(--text-secondary);font-size:1.2rem;cursor:pointer}
.modal-close:hover{color:var(--text-primary)}
.modal-title{font-size:1.1rem;font-weight:500;margin-bottom:16px}
.modal-body{color:var(--text-secondary);font-size:0.9rem;line-height:1.6}
.mb-2{margin-bottom:8px}

/* Auth form */
.auth-row{margin-bottom:10px}
.auth-row label{display:block;font-size:0.78rem;color:var(--text-secondary);margin-bottom:4px}
.auth-row input{width:100%;background:var(--bg3);border:1px solid var(--border-subtle);border-radius:8px;padding:10px 12px;font-size:0.9rem;color:var(--text-primary);outline:none}
.auth-row input:focus{border-color:var(--accent)}
.auth-err{color:#ef4444;font-size:0.78rem;margin-bottom:8px}
.auth-toggle{background:none;border:none;color:var(--accent);font-size:0.78rem;cursor:pointer;margin-top:8px}
.auth-toggle:hover{text-decoration:underline}

/* Responsive */
@media(max-width:520px){
  .cont{padding:12px}
  .hdr h1{font-size:1.25rem}
}
</style>
</head>
<body>
<div class="cont">
  <!-- Header -->
  <div class="hdr">
    <h1><span>✦</span> Drip</h1>
    <div class="hdr-actions">
      <span id="dropCount">0</span>
      <div id="authUI"></div>
    </div>
  </div>

  <!-- Filters + View Toggle -->
  <div class="ft-row">
    <div id="filters">
      <button class="filter-btn on" data-f="all">All</button>
      <button class="filter-btn" data-f="snapshot">🖼</button>
      <button class="filter-btn" data-f="capsule">🎬</button>
      <button class="filter-btn" data-f="page">📖</button>
      <button class="filter-btn" data-f="portal">🔗</button>
      <button class="filter-btn" data-f="echo">🎧</button>
      <button class="filter-btn" data-f="moment">💬</button>
    </div>
    <div class="ft-spacer"></div>
    <button class="vw-btn on" data-v="card">☰ Stream</button>
    <button class="vw-btn" data-v="echo">✦ Echo</button>
  </div>

  <!-- Drop zone -->
  <div class="drop-zone" id="dropZone">
    <div class="drop-zone-icon">+</div>
    <div class="drop-zone-text">Drop anything — text, image, video, link, audio</div>
    <div class="drop-zone-hint">Drag, paste, or click to choose files</div>
  </div>
  <input type="file" id="dropFile">

  <!-- Drop form -->
  <div class="drop-form" id="dropForm">
    <div class="df-head">
      <span class="badge on" id="typeBadge">💬 Moment</span>
      <span style="font-size:0.72rem;color:var(--text-secondary);flex:1">Fill details &amp; drop</span>
    </div>
    <div class="df-preview" id="dropPreview"></div>
    <div class="df-row"><input type="text" id="dropTitle" placeholder="Title (optional)" oninput="updateAITags()"></div>
    <div class="df-row"><textarea id="dropDesc" placeholder="Write something…" oninput="updateAITags()"></textarea></div>
    <div class="ai-hints" id="aiTags"></div>
    <div class="tag-arena" id="tagArena"><input type="text" id="tagInput" placeholder="+ add tag"></div>
    <div class="df-actions">
      <button class="btn-primary" id="dropBtn" onclick="Drip.publish()">✧ Drop into the stream</button>
      <button class="btn-cancel" onclick="Drip.cancelDrop()">Cancel</button>
    </div>
  </div>

  <!-- Stream -->
  <div class="stream" id="stream">
    <div class="loading-pulse"><div class="sk-chase"><div class="sk-chase-dot"></div><div class="sk-chase-dot"></div><div class="sk-chase-dot"></div><div class="sk-chase-dot"></div><div class="sk-chase-dot"></div><div class="sk-chase-dot"></div></div></div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal" onclick="event.target===this&&Drip.closeDetail()">
  <div class="modal-box">
    <button class="modal-close" onclick="Drip.closeDetail()">✕</button>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<!-- Auth Modal -->
<div class="modal-overlay" id="authModal" onclick="event.target===this&&(this.classList.remove('open'))">
  <div class="modal-box">
    <button class="modal-close" onclick="document.getElementById('authModal').classList.remove('open')">✕</button>
    <div class="modal-title" id="authTitle">Sign in</div>
    <div class="auth-err" id="authErr"></div>
    <div class="auth-row" id="authName" style="display:none">
      <label>Name</label>
      <input type="text" id="authNameInput" placeholder="Your display name">
    </div>
    <div class="auth-row">
      <label>Email</label>
      <input type="email" id="authEmail" placeholder="you@example.com">
    </div>
    <div class="auth-row">
      <label>Password</label>
      <input type="password" id="authPass" placeholder="••••••••">
    </div>
    <button class="btn-primary" id="authBtn2" onclick="Drip.authSubmit()" style="width:100%;margin-top:4px">Sign in</button>
    <div style="text-align:center"><button class="auth-toggle" id="authToggle" onclick="Drip.toggleAuth()">No account? Create one</button></div>
  </div>
</div>

<script src="drip.js"></script>
</body>
</html>
