name: Deploy Database Migrations

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Supabase CLI (Binary Download)
      run: |
        # Download Supabase CLI binary directly
        ARCH=$(uname -m)
        if [ "$ARCH" = "x86_64" ]; then
          ARCH="amd64"
        elif [ "$ARCH" = "aarch64" ]; then
          ARCH="arm64"
        fi
        
        # Download from GitHub Releases
        VERSION="1.192.0"  # Latest stable
        URL="https://github.com/supabase/cli/releases/download/v${VERSION}/supabase_${VERSION}_linux_${ARCH}.tar.gz"
        
        echo "Downloading Supabase CLI from: $URL"
        curl -L "$URL" -o supabase.tar.gz
        tar -xzf supabase.tar.gz
        chmod +x supabase
        sudo mv supabase /usr/local/bin/
        
        # Verify installation
        supabase --version
    
    - name: Deploy Migrations
      run: |
        cd supabase
        echo "Linking to project..."
        supabase link --project-ref lftlvycvgauzrryyqxpu
        
        echo "Deploying migrations..."
        supabase db push
        
        echo "✅ Database deployed!"
