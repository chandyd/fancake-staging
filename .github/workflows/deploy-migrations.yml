name: Deploy Database Migrations

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Supabase CLI (Correct Binary)
      run: |
        # CORRECT URL from GitHub Releases
        # https://github.com/supabase/cli/releases
        curl -L https://github.com/supabase/cli/releases/download/v1.192.0/supabase_1.192.0_linux_amd64.tar.gz -o supabase.tar.gz
        tar -xzf supabase.tar.gz
        chmod +x supabase
        sudo mv supabase /usr/local/bin/
        supabase --version
    
    - name: Deploy Migrations
      run: |
        cd supabase
        echo "Linking to project..."
        supabase link --project-ref lftlvycvgauzrryyqxpu
        
        echo "Deploying migrations..."
        supabase db push
        
        echo "✅ Database deployed!"
