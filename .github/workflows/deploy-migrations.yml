name: Deploy Database Migrations

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Supabase CLI via Docker
      run: |
        # Use Docker container with Supabase CLI pre-installed
        docker run --rm -v $(pwd):/workspace -w /workspace \
          -e SUPABASE_ACCESS_TOKEN="$SUPABASE_ACCESS_TOKEN" \
          -e SUPABASE_DB_PASSWORD="$SUPABASE_DB_PASSWORD" \
          supabase/cli:latest version
    
    - name: Deploy Migrations with Docker
      run: |
        cd supabase
        docker run --rm -v $(pwd):/workspace -w /workspace \
          -e SUPABASE_ACCESS_TOKEN="$SUPABASE_ACCESS_TOKEN" \
          -e SUPABASE_DB_PASSWORD="$SUPABASE_DB_PASSWORD" \
          supabase/cli:latest link --project-ref lftlvycvgauzrryyqxpu
        
        docker run --rm -v $(pwd):/workspace -w /workspace \
          -e SUPABASE_ACCESS_TOKEN="$SUPABASE_ACCESS_TOKEN" \
          -e SUPABASE_DB_PASSWORD="$SUPABASE_DB_PASSWORD" \
          supabase/cli:latest db push
