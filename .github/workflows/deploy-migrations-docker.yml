name: Deploy Database Migrations (Docker)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    env:
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy via psql Docker
      run: |
        # Use PostgreSQL client Docker image
        echo "Deploying database via Docker psql..."
        docker run --rm -v $(pwd):/workspace postgres:15-alpine \
          psql "postgresql://postgres.lftlvycvgauzrryyqxpu:$SUPABASE_DB_PASSWORD@aws-0-us-east-1.pooler.supabase.com:6543/postgres" \
          -f /workspace/supabase/migrations/202604211930_initial_schema.sql
        
        echo "✅ Database deployed!"
